app:
  container:
    image: PLACEHOLDER
    run_time:
      env:
        - name: S3_BUCKET
          value: science-poc-model-deployment # (1)
        - name: S3_KEY
          value: ml-model-1/model.pth
        - name: ROOT_PATH
          value: poc-model-deployment/ml-model-1 # (2)
      secrets:
        - name: OPENAPI_KEY
          value: "arn:aws:ssm:eu-west-1:463470983643:parameter/science-dev/poc-model-deployment/run-rime/openapi_key"
  port_mapping: 
    port: 8080
routing: 
  priority: 10