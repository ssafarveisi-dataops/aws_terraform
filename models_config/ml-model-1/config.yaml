########## GUIDE ##########
# (1) Do not change as we use the same bucket for all poc deployments
# (2) Should always be poc-deployment/<subdirectory name>
########## GUIDE ##########
app:
  container:
    image: PLACEHOLDER
    run_time:
      env:
        - name: S3_BUCKET
          value: science-poc-deployment # (1)
        - name: S3_PREFIX
          value: ml-model-1 # This is the folder in s3 where your artifact exists 
        - name: ROOT_PATH
          value: poc-deployment/ml-model-1 # (2)
      secrets:
        - name: OPENAPI_KEY
          value: "arn:aws:ssm:eu-west-1:463470983643:parameter/science-dev/poc-deployment/run-rime/openapi_key"
  port_mapping: 
    port: 8080
routing: 
  priority: 10